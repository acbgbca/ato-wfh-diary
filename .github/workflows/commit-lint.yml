name: Commit lint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the full history of the PR branch so commitlint can check
          # every commit, not just the most recent one.
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js
