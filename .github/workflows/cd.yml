name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create/force-update the date tag
      packages: write   # needed to push to GHCR

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Compute today's date tag (UTC) and the lowercase image path required by GHCR.
      - name: Compute date tag
        id: vars
        run: |
          echo "date_tag=$(date -u +%Y.%m.%d)" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # Create the tag locally and force-push it.  If a tag for today already
      # exists (e.g. a second merge on the same day) it is simply moved forward
      # to the new commit.
      - name: Tag commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ steps.vars.outputs.date_tag }}
          git push origin -f ${{ steps.vars.outputs.date_tag }}

      # QEMU lets Buildx produce linux/arm64 images on the amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.date_tag }}
            ${{ steps.vars.outputs.image }}:latest
          build-args: VERSION=${{ steps.vars.outputs.date_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
