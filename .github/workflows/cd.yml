name: CD

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # e.g. v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # e.g. v1.2.3-rc.1 (pre-releases)

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # QEMU lets Buildx produce linux/arm64 images on the amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # For a stable release tag (v1.2.3) this produces:
      #   ghcr.io/<owner>/ato-wfh-diary:1.2.3
      #   ghcr.io/<owner>/ato-wfh-diary:1.2
      #   ghcr.io/<owner>/ato-wfh-diary:1
      #   ghcr.io/<owner>/ato-wfh-diary:latest
      # For a pre-release tag (v1.2.3-rc.1) `latest` is omitted automatically.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          # Cache layers in the GitHub Actions cache to speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
