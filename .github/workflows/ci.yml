name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Format, vet, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Check formatting, vet, and run tests
        run: make check
